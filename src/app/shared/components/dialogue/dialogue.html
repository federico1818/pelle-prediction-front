<div class="dialogue" [class.show]="visible()">
    @if (dialogue().type === 'image') {
        <img [src]="'/assets/img/' + dialogue().src" class="dialogue-image" />
    } @else {
        <app-video #videoRef [src]="dialogue().src" [loop]="dialogue().loop ?? false" (finished)="onVideoFinished()"></app-video>
    }
    <app-dialogue-text #textRef [text]="dialogue().text"
        [mode]="hasNext() && textIsFinished() && videoIsFinished() ? 'arrow' : 'line'" (finished)="onTextFinished()">
    </app-dialogue-text>
</div>
