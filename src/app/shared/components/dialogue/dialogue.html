<div class="dialogue" [class.show]="visible()">
    <app-video #videoRef [src]="dialogue().video" (finished)="onVideoFinished()"></app-video>
    <app-dialogue-text #textRef [text]="dialogue().text"
        [mode]="hasNext() && textIsFinished() && videoIsFinished() ? 'arrow' : 'line'" (finished)="onTextFinished()">
    </app-dialogue-text>
</div>
