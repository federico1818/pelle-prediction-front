<div class="dialogue" [class.show]="visible()" [class]="dialogue().type">
    @if(dialogue().type === 'rpg' && dialogue().character) {
    <app-dialogue-character [name]="dialogue().character!"></app-dialogue-character>
    }
    @if (dialogue().type === 'image' || dialogue().type === 'rpg') {
    <img [src]="'/assets/img/' + dialogue().src" class="dialogue-image" />
    } @else {
    <app-video #videoRef [src]="dialogue().src" [loop]="dialogue().loop ?? false"
        (finished)="onVideoFinished()"></app-video>
    }
    <app-dialogue-text #textRef [text]="dialogue().text"
        [mode]="hasNext() && textIsFinished() && videoIsFinished() ? 'arrow' : 'line'" (finished)="onTextFinished()">
    </app-dialogue-text>
</div>
