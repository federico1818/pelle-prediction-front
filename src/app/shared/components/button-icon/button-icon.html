<div class="button-icon-container" [ngClass]="[variant(), size(), disabled() ? 'disabled' : '']">
    <button class="button button-icon" [disabled]="disabled()" (click)="!disabled() && onClick.emit()">
        <span class="material-symbols-outlined">
            <ng-content></ng-content>
        </span>
    </button>
</div>
