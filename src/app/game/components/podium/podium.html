<app-image-podium class="podium"></app-image-podium>
@if (first()) {
<div class="points first">{{ first()!.points }}</div>
<app-toy-with-ball class="toy first" [nickname]="first()!.nickname" [rank]="1"></app-toy-with-ball>
}
@if (second()) {
<div class="points second">{{ second()!.points }}</div>
<app-toy-with-ball class="toy second" [nickname]="second()!.nickname" [rank]="2"></app-toy-with-ball>
}
@if (third()) {
<div class="points third">{{ third()!.points }}</div>
<app-toy-with-ball class="toy third" [nickname]="third()!.nickname" [rank]="3"></app-toy-with-ball>
}
