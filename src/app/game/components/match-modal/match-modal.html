<app-modal>
    <app-modal-title>
        @if(game){
            {{ game.date_time_formatted }}
        }
    </app-modal-title>
    <app-modal-content>
        @if (game) {
        <div class="match-prediction-grid">
            <!-- Equipo 1 -->
            <app-team-flag [team]="game.team_1" class="team-flag team-1-flag"></app-team-flag>
            <span class="team-name team-1-name">{{ game.team_1.label }}</span>

            <!-- Marcador 1 -->
            <app-match-score [(score)]="game.score_1" class="score-input-1"></app-match-score>

            <!-- Marcador 2 -->
            <app-match-score [(score)]="game.score_2" class="score-input-2"></app-match-score>

            <!-- Equipo 2 -->
            <app-team-flag [team]="game.team_2" class="team-flag team-2-flag"></app-team-flag>
            <span class="team-name team-2-name">{{ game.team_2.label }}</span>
        </div>
        }
    </app-modal-content>
    <app-modal-footer>
        @if(game) {
        @if (isLoading()) {
        <app-loading></app-loading>
        } @else {
        <app-match-prediction-list [predictions]="predictions()"></app-match-prediction-list>
        }
        }
    </app-modal-footer>
</app-modal>
