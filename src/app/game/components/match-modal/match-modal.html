<app-modal>
    <app-modal-content>
        @if (game) {
        <div class="match-date-time">
            {{ game.date_time | date: 'dd/MM/yyyy HH:mm' }}
        </div>

        <div class="match-prediction-grid">
            <!-- Equipo 1 -->
            <app-team-flag [team]="game.team_1" class="team-flag team-1-flag"></app-team-flag>
            <span class="team-name team-1-name">{{ game.team_1.label }}</span>

            <!-- Marcador 1 -->
            <input type="number" [(ngModel)]="score1" min="0" class="score-input score-1-input" [class.has-value]="score1 !== null" />

            <!-- Controles 1 -->
            <button type="button" class="arrow arrow-1-up" (click)="incrementScore1()">
                <span class="material-symbols-outlined">expand_less</span>
            </button>
            <button type="button" class="arrow arrow-1-down" (click)="decrementScore1()">
                <span class="material-symbols-outlined">expand_more</span>
            </button>

            <!-- Controles 2 (Espejo) -->
            <button type="button" class="arrow arrow-2-up" (click)="incrementScore2()">
                <span class="material-symbols-outlined">expand_less</span>
            </button>
            <button type="button" class="arrow arrow-2-down" (click)="decrementScore2()">
                <span class="material-symbols-outlined">expand_more</span>
            </button>

            <!-- Marcador 2 -->
            <input type="number" [(ngModel)]="score2" min="0" class="score-input score-2-input" [class.has-value]="score2 !== null" />

            <!-- Equipo 2 -->
            <app-team-flag [team]="game.team_2" class="team-flag team-2-flag"></app-team-flag>
            <span class="team-name team-2-name">{{ game.team_2.label }}</span>
        </div>
        }
    </app-modal-content>
    <app-modal-footer>
        <app-button-primary (onClick)="submitResult()">Enviar</app-button-primary>
    </app-modal-footer>
</app-modal>
