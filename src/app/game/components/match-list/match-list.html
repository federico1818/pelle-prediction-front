<div class="match-list-container">
    @for (grouped of games; track grouped.group.name) {
    <div class="group-section">
        <h3 class="group-title">{{ grouped.group.label }}</h3>
        <div class="group-matches">
            @for (game of grouped.matches; track game.id) {
            <app-match [game]="game"></app-match>
            }
        </div>
    </div>
    }
</div>
