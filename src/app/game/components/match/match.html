<app-team-flag class="team-flag" [team]="game.team_1"></app-team-flag>
<div class="score score-1">{{ game.score_1 }}</div>
<div class="score score-2">{{ game.score_2 }}</div>

<div class="team-name team-name-1">{{ game.team_1.label }}</div>
<div class="prediction-box prediction-1" [class.predicted]="hasPrediction()">{{ game.prediction_score_1 ?? '' }}</div>
<div class="prediction-box prediction-2" [class.predicted]="hasPrediction()">{{ game.prediction_score_2 ?? '' }}</div>
<div class="team-name team-name-2">{{ game.team_2.label }}</div>
<app-team-flag class="team-flag" [team]="game.team_2"></app-team-flag>

<div class="date-time">
    {{ game.date_time }}
</div>
