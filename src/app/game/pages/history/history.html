<app-history-user-list [selectedNickname]="currentNickname()"></app-history-user-list>

@if (currentNickname()) {
    @if (isLoading()) {
        <app-loading></app-loading>
    } @else {
        <div class="history-container">
            @for (item of historyItems(); track item.game_id) {
                <app-history-item [item]="item"></app-history-item>
            }
        </div>
    }
}
